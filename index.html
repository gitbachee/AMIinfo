    <style>
        body {
            font-family: 'Inter', 'Zen Kaku Gothic New', 'Noto Sans KR', sans-serif;
            background-color: #fafafa;
            color: #18181b;
            overflow-x: hidden;
        }

        /* 1. Blob Animation (Hero Background) */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }

        /* 2. Scroll Reveal Animations (Replacement for Framer Motion viewport props) */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        /* Stagger delays */
        .delay-100 { transition-delay: 0.1s; }
        .delay-200 { transition-delay: 0.2s; }
        .delay-300 { transition-delay: 0.3s; }
        .delay-400 { transition-delay: 0.4s; }

        /* 3. 3D Card Hover Effect */
        .card-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem; /* rounded-xl */
            background-color: white;
            border: 1px solid #e4e4e7; /* border-zinc-200 */
        }
        .card-gradient {
            pointer-events: none;
            position: absolute;
            inset: -1px;
            border-radius: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: radial-gradient(
                650px circle at var(--mouse-x, 0px) var(--mouse-y, 0px),
                rgba(225, 29, 72, 0.1),
                transparent 80%
            );
            z-index: 10;
        }
        .card-wrapper:hover .card-gradient {
            opacity: 1;
        }

        /* Utils */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Font switching classes */
        .font-sans-jp { font-family: 'Inter', 'Zen Kaku Gothic New', sans-serif; letter-spacing: -0.3px; }
        .font-sans-kr { font-family: 'Inter', 'Noto Sans KR', sans-serif; }

        /* Presentation Deck Slides */
        .deck-slide {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(145deg, #fafafa, #f1f1f1);
            border: 1px solid #d4d4d8;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }
        .deck-bubble {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid #d4d4d8;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            color: #18181b;
            line-height: 1.25;
            white-space: pre-line;
            font-size: clamp(0.35rem, 0.8vw, 0.7rem);
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 2;
            cursor: default;
            aspect-ratio: 1;
        }
        .deck-bubble:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .deck-bubble.lg {
            font-size: clamp(0.5rem, 1.05vw, 0.9rem);
            font-weight: 700;
        }
        .deck-chevron {
            width: 0; height: 0;
            border-top: clamp(28px, 5.5vw, 58px) solid transparent;
            border-bottom: clamp(28px, 5.5vw, 58px) solid transparent;
            border-left: clamp(35px, 7vw, 78px) solid #e11d48;
            margin-left: -10px;
        }
        .deck-year .yr {
            border: 2px solid #d4d4d8;
            border-radius: 6px;
            padding: clamp(3px, 0.6vw, 8px) clamp(6px, 1.2vw, 16px);
            font-size: clamp(0.6rem, 1.3vw, 1.1rem);
            font-weight: 800;
            color: #18181b;
            background: white;
        }
        .deck-ms-text {
            font-size: clamp(0.38rem, 0.78vw, 0.68rem);
            font-weight: 600;
            color: #18181b;
            white-space: pre-line;
            line-height: 1.45;
            border-left: 2px solid #a1a1aa;
            padding-left: clamp(4px, 0.5vw, 8px);
        }
        @media (max-width: 640px) {
            .deck-slide { aspect-ratio: 4/3; }
            .deck-bubble { font-size: 0.32rem; }
            .deck-bubble.lg { font-size: 0.4rem; }
        }
    </style>

                [4, 52, 9],      // 3: 紙出版      (ドラマ pos, small)
                [20, 38, 8.5],   // 4: プロモーションMV (middle tier)
                [56, 40, 9],     // 5: ショートムービー (middle-lower)
                [14, 57, 9.5],   // 6: グッズ       (middle-right)
                [20, 72, 16],    // 7: IP Creation  (replaces アニメ+映画 cluster)
            ];
            document.getElementById('deck-bubbles').innerHTML = v.bubbles.map((label, i) => {
                const [t, l, w] = bPos[i];
                return `<div class="deck-bubble${w >= 12 ? ' lg' : ''}" style="top:${t}%;left:${l}%;width:${w}%;">${label}</div>`;
            }).join('');

            // Radiating rays from マンガ翻訳 (index 0) to every other bubble
            const ctrs = bPos.map(([t, l, w]) => [(l + w/2) * 16, (t + w/2) * 9]);
            const [ox, oy] = ctrs[0];
            document.getElementById('deck-rays').innerHTML = `
                <defs>
                    <marker id="ray-tip" markerWidth="18" markerHeight="12" refX="16" refY="6" orient="auto" markerUnits="userSpaceOnUse">
                        <path d="M0,1.5 L14,6 L0,10.5 L2.5,6 Z" fill="#e11d48" fill-opacity="0.45"/>
                    </marker>
                </defs>
            ` + ctrs.slice(1).map(([x2, y2]) => {
                return `<line x1="${ox.toFixed(0)}" y1="${oy.toFixed(0)}" x2="${x2.toFixed(0)}" y2="${y2.toFixed(0)}" stroke="#e11d48" stroke-width="2.5" stroke-opacity="0.18" marker-end="url(#ray-tip)"/>`;
            }).join('');

            // Timeline
            document.getElementById('deck-tl-title').innerText = v.timelineTitle;
            document.getElementById('deck-tl-desc').innerText = v.timelineDesc;
            document.getElementById('deck-tl-footer').innerText = v.timelineFooter;

            const yPos = [12, 32, 52, 72]; // year left%
            const mTop = [50, 38, 26, 14]; // milestone top% (ascending)
            document.getElementById('deck-timeline').innerHTML = v.milestones.map((m, i) => {
                const yl = yPos[i];
                const mt = mTop[i];
                return `
                    <div class="deck-year absolute z-[3]" style="bottom:24%;left:${yl}%;transform:translateX(-50%);">
                        <span class="yr">${m.year}</span>
                    </div>
                    <div class="absolute z-[2]" style="left:${yl}%;bottom:30%;height:${70 - mt}%;width:1.5px;background:#a1a1aa;"></div>
                    <div class="deck-ms-text absolute z-[3]" style="top:${mt}%;left:${yl + 1.5}%;">${m.text}</div>
                `;
            }).join('');

            // 7. About
            document.getElementById('about-title').innerText = data.about.title;
            document.getElementById('about-company-primary').innerText = data.about.companyName.primary;
            document.getElementById('about-company-secondary').innerText = data.about.companyName.secondary;
            document.getElementById('about-content').innerHTML = data.about.content.map(p => `<p>${p}</p>`).join('');
            // Company Info Table
            const companyInfoDiv = document.getElementById('about-company-info');
            if (data.about.companyInfo) {
                companyInfoDiv.innerHTML = data.about.companyInfo.map(row => `
                    <div class="flex py-3 border-b border-zinc-100">
                        <span class="w-20 md:w-24 shrink-0 font-medium text-zinc-400 text-xs uppercase tracking-wide pt-0.5">${row.label}</span>
                        <span class="text-zinc-700 leading-relaxed">${row.value}</span>
                    </div>
                `).join('');
            }
            document.getElementById('about-cloud').innerText = data.about.cloudInfo;

            // 8. Contact
            document.getElementById('contact-title').innerText = data.partnership.title;
            document.getElementById('contact-desc').innerText = data.partnership.desc;
            document.getElementById('label-name').innerText = data.partnership.form.name;
            document.getElementById('label-email').innerText = data.partnership.form.email;
            document.getElementById('label-message').innerText = data.partnership.form.message;
            document.getElementById('submit-text').innerText = data.partnership.form.submit;
            document.getElementById('contact-success-msg').innerText = data.partnership.form.success;

            // 9. Footer
            document.getElementById('year').innerText = new Date().getFullYear();

            // Re-initialize icons and 3D effects
            lucide.createIcons();
            init3DEffects();
            initScrollAnimations(); // Re-trigger for new elements
        }

        // --- INTERACTION LOGIC ---

        // 1. Mobile Menu Toggle
        document.getElementById('mobile-menu-btn').onclick = toggleMobileMenu;
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.querySelector('#mobile-menu-btn i');
            
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                // Change icon to X (simulated by re-rendering Lucide)
                icon.setAttribute('data-lucide', 'x');
            } else {
                menu.classList.add('hidden');
                icon.setAttribute('data-lucide', 'menu');
            }
            lucide.createIcons();
        }

        // 2. Scroll Header Logic
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('bg-white/80', 'backdrop-blur-md', 'border-b', 'border-zinc-100', 'py-3');
                nav.classList.remove('py-5', 'bg-transparent');
            } else {
                nav.classList.remove('bg-white/80', 'backdrop-blur-md', 'border-b', 'border-zinc-100', 'py-3');
                nav.classList.add('py-5', 'bg-transparent');
            }
        });

        // 3. 3D Card Effect (Vanilla JS version of useMotionValue/useMotionTemplate)
        function init3DEffects() {
            const cards = document.querySelectorAll('.card-wrapper');
            cards.forEach(card => {
                card.onmousemove = e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                };
            });
        }

        // 4. Scroll Reveal (IntersectionObserver)
        function initScrollAnimations() {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            reveals.forEach(el => observer.observe(el));
        }

        // 5. Contact Form Handler
        function handleFormSubmit(e) {
            e.preventDefault();
            const honeypot = document.getElementById('honeypot').value;
            if (honeypot) return;

            const btn = document.getElementById('submit-btn');
            const btnIcon = document.getElementById('btn-icon');
            
            // Loading State
            btn.disabled = true;
            btn.classList.add('opacity-75');
            btnIcon.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();

            // Simulate API
            setTimeout(() => {
                document.getElementById('contact-form').classList.add('hidden');
                document.getElementById('contact-success').classList.remove('hidden');
                // Reset button state
                btn.disabled = false;
                btn.classList.remove('opacity-75');
                btnIcon.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i>`;
                lucide.createIcons();
            }, 1500);
        }

        function resetForm() {
            document.getElementById('contact-form').reset();
            document.getElementById('contact-success').classList.add('hidden');
            document.getElementById('contact-form').classList.remove('hidden');
        }

        // --- INIT ---
        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
